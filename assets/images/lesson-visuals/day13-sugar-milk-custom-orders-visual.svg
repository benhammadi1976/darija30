<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Darija30 lesson visual for day 13: Sugar, Milk, Custom Orders</title>
  <desc id="desc">Stylized Moroccan learning visual with a transparent memory bubble and lesson title.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <pattern id="tile" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <path d="M60 8 L112 60 L60 112 L8 60 Z" fill="none" stroke="#f59e0b" stroke-opacity="0.18" stroke-width="4"/>
      <path d="M60 28 L92 60 L60 92 L28 60 Z" fill="none" stroke="#f59e0b" stroke-opacity="0.12" stroke-width="3"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#g)"/>
  <rect width="1200" height="1200" fill="url(#tile)"/>
  <g filter="url(#shadow)">
    <rect x="110" y="110" rx="42" width="980" height="980" fill="#ffffff" fill-opacity="0.84"/>
  </g>
  <rect x="160" y="160" rx="28" width="180" height="52" fill="#ea580c" fill-opacity="0.12" stroke="#ea580c" stroke-opacity="0.25"/>
  <text x="250" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ea580c">DAY 13</text>
  <text x="160" y="280" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#7c2d12">Sugar, Milk, Custom Orders</text>
  <text x="160" y="336" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ea580c">Café, Restaurant & Food</text>
  <g transform="translate(160,430)">
    <circle cx="170" cy="170" r="122" fill="#ea580c" fill-opacity="0.12"/>
    <circle cx="170" cy="120" r="52" fill="#ea580c" fill-opacity="0.75"/>
    <path d="M86 292 C92 224 126 184 170 184 C214 184 248 224 254 292" fill="#ea580c" fill-opacity="0.75"/>
    <rect x="360" y="58" rx="34" width="460" height="236" fill="#ffffff" fill-opacity="0.58" stroke="#ea580c" stroke-opacity="0.35" stroke-width="4"/>
    <path d="M420 294 L388 346 L376 292 Z" fill="#ffffff" fill-opacity="0.58" stroke="#ea580c" stroke-opacity="0.35" stroke-width="4"/>
    <text x="390" y="126" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ea580c">MEMORY PHRASE</text>
