      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Arial, sans-serif; font-size: 40px; font-weight: 800; line-height: 1.2; color: #7c2d12; opacity: 0.94;">bla sokkar</div>
    </foreignObject>
    <text x="390" y="286" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#64748b">Visual cue only — real audio and video can be added later.</text>
